version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: acta_postgres
    environment:
      POSTGRES_USER: acta_user
      POSTGRES_PASSWORD: acta_password
      POSTGRES_DB: acta_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acta_user -d acta_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acta_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: acta_web
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=Acta_backend.settings.production
      - DATABASE_URL=postgres://acta_user:acta_password@db:5432/acta_db
      - DATABASE_SSL_REQUIRE=False
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - USE_S3=False
      - SECRET_KEY=django-insecure-local-compose-development-key-12345
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
